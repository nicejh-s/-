<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 식단 플래너</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --g:#27ae60;--gl:#e8f8f0;
  --d:#e74c3c;--dl:#fde8e6;
  --t:#8e44ad;--tl:#f3e8fd;
  --bg:#f5f6fa;--card:#fff;--text:#2c3e50;--muted:#7f8c8d;--border:#ecf0f1
}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:28px 20px;text-align:center}
.header h1{font-size:1.8rem;font-weight:800;margin-bottom:6px}
.week-label{font-size:1rem;opacity:.9;margin-bottom:3px}
.auto-note{font-size:.8rem;opacity:.65}
.legend{display:flex;justify-content:center;gap:20px;padding:12px 20px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap}
.li{display:flex;align-items:center;gap:7px;font-size:.85rem;font-weight:600}
.dot{width:11px;height:11px;border-radius:50%}
.dot.g{background:var(--g)}.dot.d{background:var(--d)}.dot.t{background:var(--t)}
.nav{display:flex;justify-content:center;gap:10px;padding:14px 20px;background:#fff;border-bottom:1px solid var(--border)}
.nav button{padding:7px 18px;border:1.5px solid #667eea;color:#667eea;background:#fff;border-radius:20px;cursor:pointer;font-size:.85rem;font-weight:600;transition:.15s}
.nav button:hover{background:#667eea;color:#fff}
.nav button.cur{background:#667eea;color:#fff}
.main{padding:20px;max-width:1400px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
@media(max-width:1100px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr)}.main{padding:12px}}
@media(max-width:400px){.grid{grid-template-columns:1fr}}
.day-card{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:.2s}
.day-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.1)}
.day-card.today .dh{background:linear-gradient(135deg,#f093fb,#f5576c)}
.dh{padding:10px 12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.dh .dn{font-weight:700;font-size:.95rem}
.dh .dd{font-size:.72rem;opacity:.85;margin-top:2px}
.meals{padding:7px}
.mi{padding:8px 9px;border-radius:9px;margin-bottom:5px;cursor:pointer;transition:.15s;border:1.5px solid transparent}
.mi:last-child{margin-bottom:0}
.mi:hover{transform:scale(1.02)}
.mi.g{background:var(--gl);color:var(--g)}.mi.g:hover{border-color:var(--g)}
.mi.d{background:var(--dl);color:var(--d)}.mi.d:hover{border-color:var(--d)}
.mi.t{background:var(--tl);color:var(--t)}.mi.t:hover{border-color:var(--t)}
.mt{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;opacity:.65;margin-bottom:1px}
.mn{font-size:.78rem;font-weight:600;line-height:1.3}
.me{font-size:.95rem;margin-bottom:1px}
.stats{display:flex;justify-content:center;gap:16px;margin-top:20px;flex-wrap:wrap}
.stat{text-align:center;padding:14px 22px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sn{font-size:1.8rem;font-weight:800}
.sl{font-size:.75rem;color:var(--muted);margin-top:3px}
.stat.g .sn{color:var(--g)}.stat.d .sn{color:var(--d)}.stat.t .sn{color:var(--t)}
.countdown-bar{text-align:center;padding:16px;color:var(--muted);font-size:.85rem;margin-top:4px}
.countdown-bar span{font-weight:700;color:#667eea}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border);margin-top:8px}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:20px;max-width:540px;width:100%;max-height:85vh;overflow-y:auto;animation:mi .25s ease}
@keyframes mi{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mhd{padding:20px 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;border-radius:20px 20px 0 0}
.mbadge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;color:#fff;margin-bottom:8px}
.mbadge.g{background:var(--g)}.mbadge.d{background:var(--d)}.mbadge.t{background:var(--t)}
.mclose{float:right;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);line-height:1}
.mclose:hover{color:var(--text)}
.mtitle{font-size:1.25rem;font-weight:800;line-height:1.3}
.mmeta{font-size:.8rem;color:var(--muted);margin-top:6px}
.mbody{padding:18px 20px 22px}
.sec{font-size:.95rem;font-weight:700;margin:16px 0 10px;display:flex;align-items:center;gap:6px}
.sec:first-child{margin-top:0}
.igrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:4px}
.ig{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg);border-radius:8px;font-size:.82rem}
.ia{color:var(--muted);font-size:.78rem}
.steps{list-style:none}
.step{display:flex;gap:10px;margin-bottom:10px;font-size:.88rem;line-height:1.55}
.snum{flex-shrink:0;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:#fff;margin-top:2px}
.snum.g{background:var(--g)}.snum.d{background:var(--d)}.snum.t{background:var(--t)}
.tip{background:#fffbf0;border:1px solid #f5d76e;border-radius:10px;padding:11px 13px;margin-top:14px;font-size:.82rem;color:#7d6608;line-height:1.5}
/* Shopping List */
.shop-wrap{max-width:1400px;margin:20px auto 0;padding:0 20px 20px}
.shop-card{background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
.shop-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:linear-gradient(135deg,#11998e,#38ef7d);color:#fff;cursor:pointer;user-select:none}
.shop-header h2{font-size:1rem;font-weight:800;display:flex;align-items:center;gap:8px}
.shop-header .shop-meta{font-size:.8rem;opacity:.85}
.shop-actions{display:flex;gap:8px;align-items:center}
.shop-btn{padding:5px 12px;border-radius:14px;border:1.5px solid rgba(255,255,255,.7);background:transparent;color:#fff;font-size:.78rem;font-weight:700;cursor:pointer;transition:.15s}
.shop-btn:hover{background:rgba(255,255,255,.2)}
.shop-toggle{font-size:1.1rem;transition:.3s}
.shop-toggle.open{transform:rotate(180deg)}
.shop-body{padding:16px 20px 20px}
.shop-cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.shop-cat{background:var(--bg);border-radius:12px;padding:12px 14px}
.shop-cat-title{font-size:.82rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.shop-items{display:flex;flex-direction:column;gap:5px}
.shop-item{display:flex;align-items:center;gap:9px;font-size:.88rem;cursor:pointer;padding:3px 0}
.shop-item input[type=checkbox]{width:16px;height:16px;accent-color:#11998e;cursor:pointer;flex-shrink:0}
.shop-item label{cursor:pointer;line-height:1.3;flex:1}
.shop-item.checked label{text-decoration:line-through;color:var(--muted)}
.shop-item .shop-count{font-size:.72rem;color:#11998e;font-weight:700;background:#e8f8f5;padding:1px 6px;border-radius:8px;flex-shrink:0}
.shop-empty{text-align:center;padding:30px;color:var(--muted);font-size:.9rem}
@media(max-width:700px){.shop-wrap{padding:0 12px 16px}.shop-cats{grid-template-columns:1fr}}
/* AI Summary */
.ai-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:linear-gradient(90deg,#f8f3ff,#fff);border-bottom:1px solid #ede0ff}
.ai-btn{display:flex;align-items:center;gap:7px;padding:8px 18px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:20px;font-size:.85rem;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 2px 8px rgba(102,126,234,.3)}
.ai-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(102,126,234,.4)}
.ai-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.ai-btn .spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-result{padding:18px 22px;background:#fdfcff;border-bottom:1px solid #ede0ff;display:none}
.ai-result.show{display:block}
.ai-result-inner{font-size:.88rem;line-height:1.8;color:var(--text)}
.ai-result-inner h3{font-size:.9rem;font-weight:800;color:#764ba2;margin:12px 0 5px}
.ai-result-inner h3:first-child{margin-top:0}
.ai-result-inner ul{padding-left:18px;margin:4px 0 8px}
.ai-result-inner li{margin-bottom:3px}
.ai-result-inner strong{color:#764ba2}
.ai-result-inner p{margin-bottom:6px}
.ai-badge{font-size:.72rem;background:#ede0ff;color:#764ba2;padding:2px 8px;border-radius:10px;font-weight:700;margin-left:6px}
</style>
</head>
<body>

<div class="header">
  <h1>🍱 주간 식단 플래너</h1>
  <div class="week-label" id="weekLabel"></div>
  <div class="auto-note">매주 월요일 자동 업데이트 • 클릭하면 레시피를 볼 수 있어요</div>
</div>

<div class="legend">
  <div class="li"><div class="dot g"></div>🥗 건강식 (1/3)</div>
  <div class="li"><div class="dot d"></div>😋 맛난 음식 (1/3)</div>
  <div class="li"><div class="dot t"></div>✨ 트렌디 음식 (1/3)</div>
</div>

<div class="nav">
  <button onclick="changeWeek(-1)">◀ 이전 주</button>
  <button class="cur" onclick="goNow()">이번 주</button>
  <button onclick="changeWeek(1)">다음 주 ▶</button>
</div>

<div class="main">
  <div class="grid" id="grid"></div>
  <div class="stats" id="stats"></div>
  <div class="countdown-bar" id="cd"></div>
</div>

<div class="shop-wrap">
  <div class="shop-card">
    <div class="shop-header" onclick="toggleShop()">
      <h2>🛒 이번 주 장보기 목록</h2>
      <div class="shop-actions">
        <span class="shop-meta" id="shopMeta"></span>
        <button class="shop-btn" onclick="event.stopPropagation();resetChecks()">초기화</button>
        <button class="shop-btn" onclick="event.stopPropagation();copyList()">복사</button>
        <button class="shop-btn" onclick="event.stopPropagation();printList()">인쇄</button>
        <span class="shop-toggle" id="shopToggle">▼</span>
      </div>
    </div>
    <div class="ai-bar">
      <div style="font-size:.85rem;color:var(--muted)">✨ Gemini AI가 이번 주 장보기를 스마트하게 요약해드려요</div>
      <button class="ai-btn" id="aiBtn" onclick="runGeminiSummary()">
        <span>✦</span> AI 요약 생성
      </button>
    </div>
    <div class="ai-result" id="aiResult">
      <div class="ai-result-inner" id="aiResultInner"></div>
    </div>
    <div class="shop-body" id="shopBody">
      <div class="shop-cats" id="shopCats"></div>
    </div>
  </div>
</div>

<div class="footer">🌿 건강하고 맛있는 한 주 되세요!</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="mhd">
      <button class="mclose" onclick="closeModal()">✕</button>
      <div class="mbadge" id="mbadge"></div>
      <div class="mtitle" id="mtitle"></div>
      <div class="mmeta" id="mmeta"></div>
    </div>
    <div class="mbody">
      <div class="sec">🛒 재료</div>
      <div class="igrid" id="migrid"></div>
      <div class="sec">👨‍🍳 레시피</div>
      <ul class="steps" id="msteps"></ul>
      <div class="tip" id="mtip"></div>
    </div>
  </div>
</div>

<script>
// ── MEAL DATABASE ──────────────────────────────────────────────────────────
const DB = {
healthy:[
{name:'현미밥 미역국 정식',emoji:'🥣',time:'30분',cal:'약 420kcal',
 ing:[{n:'현미',a:'1컵'},{n:'건미역',a:'10g'},{n:'시금치',a:'200g'},{n:'멸치육수',a:'4컵'},{n:'국간장',a:'1큰술'},{n:'참기름',a:'1큰술'},{n:'마늘',a:'2쪽'},{n:'소금',a:'약간'}],
 steps:['현미를 씻어 30분 이상 불린 후 밥을 짓는다.','건미역은 찬물에 15분 불려 먹기 좋게 썬다.','냄비에 참기름 두르고 마늘 볶다가 미역 넣어 볶는다.','멸치육수 붓고 국간장으로 간해 10분 끓인다.','시금치는 끓는 물에 30초 데쳐 찬물에 헹군 후 참기름·소금으로 무친다.','현미밥, 미역국, 시금치나물을 상에 낸다.'],
 tip:'현미는 전날 밤 불려두면 소화가 훨씬 잘 됩니다.'},

{name:'귀리 오트밀 과일 볼',emoji:'🥗',time:'10분',cal:'약 320kcal',
 ing:[{n:'귀리',a:'½컵'},{n:'우유(또는 귀리유)',a:'1컵'},{n:'바나나',a:'½개'},{n:'블루베리',a:'한 줌'},{n:'아몬드',a:'10알'},{n:'꿀',a:'1작은술'},{n:'시나몬',a:'약간'}],
 steps:['귀리에 우유를 부어 전자레인지 2분 30초 돌린다.','잘 저어 1분 더 가열한다.','바나나를 슬라이스하고 블루베리를 준비한다.','오트밀 위에 과일, 아몬드를 올린다.','꿀과 시나몬을 뿌려 마무리한다.'],
 tip:'전날 밤 귀리를 우유에 담가두는 오버나이트 오트밀로 만들면 더 부드럽습니다.'},

{name:'닭가슴살 퀴노아 샐러드',emoji:'🥙',time:'25분',cal:'약 380kcal',
 ing:[{n:'닭가슴살',a:'150g'},{n:'퀴노아',a:'½컵'},{n:'로메인',a:'3장'},{n:'방울토마토',a:'8개'},{n:'오이',a:'½개'},{n:'올리브오일',a:'2큰술'},{n:'레몬즙',a:'1큰술'},{n:'소금·후추',a:'약간'}],
 steps:['퀴노아는 물에 씻어 2배 물로 15분 삶은 후 식힌다.','닭가슴살은 소금·후추 밑간 후 팬에서 앞뒤 각 4분 굽는다.','닭가슴살을 결대로 찢어둔다.','채소를 먹기 좋게 썬다.','올리브오일, 레몬즙, 소금으로 드레싱을 만든다.','모든 재료를 합쳐 드레싱을 뿌린다.'],
 tip:'퀴노아 대신 렌틸콩을 써도 맛있어요. 드레싱에 디종 머스터드 1작은술을 추가하면 풍미가 올라갑니다.'},

{name:'연어 레몬 구이 + 아스파라거스',emoji:'🐟',time:'20분',cal:'약 420kcal',
 ing:[{n:'연어 필렛',a:'180g'},{n:'아스파라거스',a:'8대'},{n:'레몬',a:'½개'},{n:'올리브오일',a:'2큰술'},{n:'마늘',a:'2쪽'},{n:'소금·후추',a:'약간'},{n:'딜(허브)',a:'약간'}],
 steps:['연어에 소금, 후추, 레몬즙으로 밑간한다.','아스파라거스 밑동을 꺾어 질긴 부분을 제거한다.','팬에 올리브오일 두르고 강불에 연어를 껍질면부터 3분 굽는다.','뒤집어 2분 더 구운 후 꺼낸다.','같은 팬에 마늘, 아스파라거스 넣어 2분 볶는다.','레몬 슬라이스와 딜을 올려 낸다.'],
 tip:'연어는 중심이 살짝 분홍빛 남을 정도로 구워야 촉촉합니다.'},

{name:'두부 스크램블 통밀 토스트',emoji:'🍞',time:'15분',cal:'약 350kcal',
 ing:[{n:'단단한 두부',a:'200g'},{n:'통밀 식빵',a:'2장'},{n:'강황',a:'½작은술'},{n:'양파',a:'¼개'},{n:'파프리카',a:'½개'},{n:'올리브오일',a:'1큰술'},{n:'소금·후추',a:'약간'},{n:'파슬리',a:'약간'}],
 steps:['두부는 키친타월로 눌러 물기를 뺀다.','양파, 파프리카를 잘게 썬다.','팬에 올리브오일 두르고 채소를 3분 볶는다.','두부를 손으로 부수어 넣고 강황, 소금, 후추로 간한다.','5분간 볶으며 수분을 날린다.','통밀 토스트 위에 올리고 파슬리를 뿌린다.'],
 tip:'강황이 없으면 커리 파우더로 대체 가능합니다. 비건 식단으로도 완벽!'},

{name:'콩나물 해장국 + 잡곡밥',emoji:'🍲',time:'25분',cal:'약 380kcal',
 ing:[{n:'콩나물',a:'200g'},{n:'잡곡밥',a:'1공기'},{n:'고춧가루',a:'1큰술'},{n:'국간장',a:'1큰술'},{n:'마늘',a:'3쪽'},{n:'대파',a:'1대'},{n:'달걀',a:'1개'},{n:'멸치육수',a:'5컵'}],
 steps:['콩나물은 씻어 뚜껑 닫고 육수와 함께 5분 삶는다 (중간에 뚜껑 열지 않기).','마늘, 고춧가루, 국간장을 넣어 10분 더 끓인다.','대파를 어슷 썰어 넣는다.','달걀을 풀어 넣고 30초 끓인다.','잡곡밥과 함께 낸다.'],
 tip:'콩나물 삶을 때 뚜껑을 열면 비린내가 나니 반드시 뚜껑을 닫고 삶으세요.'},

// ── DATE UTILITIES ─────────────────────────────────────────────────────────
function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return [d.getUTCFullYear(), Math.ceil((((d - yearStart) / 86400000) + 1) / 7)];
}

function getMondayOf(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}

function fmt(date) {
  return `${date.getMonth()+1}월 ${date.getDate()}일`;
}

// ── SEEDED RNG ─────────────────────────────────────────────────────────────
function rng(seed) {
  let s = seed >>> 0;
  return () => {
    s = Math.imul(1664525, s) + 1013904223 >>> 0;
    return s / 4294967296;
  };
}

function shuffle(arr, rand) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── PLAN GENERATOR ─────────────────────────────────────────────────────────
function generatePlan(year, week) {
  const seed = year * 1000 + week;
  const rand = rng(seed);

  const cats = ['healthy', 'delicious', 'trendy'];
  let pools = {};
  cats.forEach(c => { pools[c] = shuffle(DB[c].map((_,i) => i), rand); });

  // 21 slots: 7 per category
  const slots = [];
  for (let i = 0; i < 7; i++) slots.push({cat:'healthy', idx: pools.healthy[i % pools.healthy.length]});
  for (let i = 0; i < 7; i++) slots.push({cat:'delicious', idx: pools.delicious[i % pools.delicious.length]});
  for (let i = 0; i < 7; i++) slots.push({cat:'trendy', idx: pools.trendy[i % pools.trendy.length]});

  const shuffled = shuffle(slots, rand);

  // 7 days × 3 meals
  const plan = [];
  for (let d = 0; d < 7; d++) {
    plan.push([shuffled[d*3], shuffled[d*3+1], shuffled[d*3+2]]);
  }
  return plan;
}

function updateCountdown() {
  const now = new Date();
  const nextMon = getMondayOf(now);
  if (nextMon <= now) nextMon.setDate(nextMon.getDate() + 7);
  const diff = nextMon - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const d = Math.floor(h / 24);
  const hh = h % 24;
  document.getElementById('cd').innerHTML =
    `다음 월요일 업데이트까지: <span>${d}일 ${hh}시간 ${m}분 ${s}초</span>`;
}

function categorize(name) {
  const clean = name.replace(/[()·\s].*/,'').trim();
  for (const cat of SHOP_CATS.slice(0,-1)) {
    if (cat.kw.some(k => clean.includes(k) || k.includes(clean))) return cat.key;
  }
  return 'etc';
}

function normalizeIngredient(raw) {
  return raw
    .replace(/\(.*?\)/g,'')
    .replace(/또는.*/,'')
    .replace(/\s+/g,' ')
    .replace(/[·,/].*/,'')
    .trim();
}

let checkedItems = new Set();
let shopOpen = true;

function buildShoppingList(plan) {
  const freq = {};
  plan.flat().forEach(slot => {
    const meal = DB[slot.cat][slot.idx];
    meal.ing.forEach(({n}) => {
      if (/약간|적당|조금/.test(n)) return;
      const key = normalizeIngredient(n);
      if (!key || key.length < 2) return;
      freq[key] = (freq[key] || 0) + 1;
    });
  });

  const grouped = {};
  SHOP_CATS.forEach(c => { grouped[c.key] = []; });
  Object.entries(freq).forEach(([name, count]) => {
    const catKey = categorize(name);
    grouped[catKey].push({name, count});
  });
  SHOP_CATS.forEach(c => {
    grouped[c.key].sort((a,b) => b.count - a.count || a.name.localeCompare(b.name));
  });
  return grouped;
}

function renderShoppingList(plan) {
  const grouped = buildShoppingList(plan);
  const total = Object.values(grouped).flat().length;
  document.getElementById('shopMeta').textContent = `총 ${total}가지 재료`;

  const catsEl = document.getElementById('shopCats');
  catsEl.innerHTML = '';

  SHOP_CATS.forEach(cat => {
    const items = grouped[cat.key];
    if (!items.length) return;
    const div = document.createElement('div');
    div.className = 'shop-cat';
    div.innerHTML = `
      <div class="shop-cat-title">${cat.label} <span style="font-weight:400;font-size:.75rem">(${items.length})</span></div>
      <div class="shop-items">
        ${items.map(({name, count}) => {
          const id = 'si_' + name.replace(/\s/g,'_');
          const isChecked = checkedItems.has(name);
          return `<div class="shop-item${isChecked?' checked':''}" id="wrap_${id}">
            <input type="checkbox" id="${id}" ${isChecked?'checked':''} onchange="toggleItem('${name}','${id}')">
            <label for="${id}">${name}</label>
            ${count > 1 ? `<span class="shop-count">${count}회</span>` : ''}
          </div>`;
        }).join('')}
      </div>`;
    catsEl.appendChild(div);
  });
}

function toggleItem(name, id) {
  const wrap = document.getElementById('wrap_' + id);
  if (checkedItems.has(name)) {
    checkedItems.delete(name);
    wrap.classList.remove('checked');
  } else {
    checkedItems.add(name);
    wrap.classList.add('checked');
  }
}

function resetChecks() {
  checkedItems.clear();
  document.querySelectorAll('.shop-item').forEach(el => {
    el.classList.remove('checked');
    el.querySelector('input').checked = false;
  });
}

function markdownToHtml(text) {
  return text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/^\*\*(.+?)\*\*$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^\d+\.\s+\*\*(.+?)\*\*/gm, '<h3>$1</h3>')
    .replace(/^\d+\.\s+(.+)$/gm, '<h3>$1</h3>')
    .replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/★/g, '★')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/^(?!<[hup])/gm, '')
    .replace(/(<p><\/p>)+/g, '')
    .trim();
}
